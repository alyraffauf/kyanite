# Ensure systemd-sysupdate / sysext state dirs exist with the
# systemd_importd_var_run_t SELinux label registered in 04-workarounds.sh.
# Wrong labels (e.g. inherited container_var_lib_t from earlier deployments)
# block systemd-sysupdate.service when it transitions to systemd_importd_t.
d /var/lib/sysupdate 0755 root root -
Z /var/lib/sysupdate - - - -
d /var/lib/extensions 0755 root root -
Z /var/lib/extensions - - - -
