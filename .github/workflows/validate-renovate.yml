---
name: Validate Renovate Config
permissions:
    contents: read

on:
    pull_request:
        paths:
            - ".github/renovate.json5"
            - ".github/workflows/renovate.yml"
    push:
        branches:
            - main
        paths:
            - ".github/renovate.json5"
            - ".github/workflows/renovate.yml"

jobs:
    validate:
        name: Validate Renovate Config
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Repository
              uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

            - name: Set Up Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
              with:
                  node-version: latest

            - name: Install Renovate
              env:
                  RENOVATE_VERSION: latest
              run: |
                  echo "Installing Renovate..."
                  npm install -g renovate@${RENOVATE_VERSION}
                  echo "✓ Renovate installed successfully"

            - name: Validate Renovate Configuration
              run: |
                  echo "Validating Renovate configuration..."
                  echo ""
                  set -x
                  renovate-config-validator --strict
                  set +x
                  echo ""
                  echo "✓ Renovate configuration validated successfully"
