---
name: Build Images
on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
        paths-ignore:
            - "**/README.md"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-kyanite:
        name: Build kyanite
        uses: ./.github/workflows/reusable_build.yml
        secrets: inherit
        permissions:
            contents: read
            packages: write
            id-token: write
        with:
            image_name: "kyanite"
            image_flavor: "main"
            image_desc: "Kyanite - A clean KDE Plasma bootc image"
            image_keywords: "bootc,ublue,universal-blue,kde"

    alias-deprecated-tags:
        name: Alias deprecated variant tags to kyanite
        needs: [build-kyanite]
        if: github.event_name == 'push'
        runs-on: ubuntu-24.04
        permissions:
            packages: write
        steps:
            - name: Login to ghcr.io
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Alias deprecated tags to kyanite:stable
              run: |
                  for tag in kyanite-dx kyanite-dx-gaming kyanite-gaming; do
                      docker buildx imagetools create \
                          -t "ghcr.io/${{ github.repository_owner }}/${tag}:stable" \
                          "ghcr.io/${{ github.repository_owner }}/kyanite:stable"
                  done
