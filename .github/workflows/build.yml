---
name: Build Images
on:
    pull_request:
        branches:
            - main
    push:
        branches:
            - main
        paths-ignore:
            - "**/README.md"
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build-kyanite:
        name: Build kyanite
        uses: ./.github/workflows/reusable_build.yml
        permissions:
            contents: read
            packages: write
            id-token: write
        with:
            image_name: "kyanite"
            image_flavor: "main"
            image_desc: "Kyanite - A clean KDE Plasma bootc image"
            image_keywords: "bootc,ublue,universal-blue,kde"

    build-kyanite-dx:
        name: Build kyanite-dx
        uses: ./.github/workflows/reusable_build.yml
        permissions:
            contents: read
            packages: write
            id-token: write
        with:
            image_name: "kyanite-dx"
            image_flavor: "dx"
            image_desc: "Kyanite DX - Developer-focused variant with dev tools"
            image_keywords: "bootc,ublue,universal-blue,kde,dx"

    alias-deprecated-tags:
        name: Alias deprecated -gaming tags
        needs: [build-kyanite, build-kyanite-dx]
        if: github.event_name == 'push'
        runs-on: ubuntu-24.04
        permissions:
            packages: write
        steps:
            - name: Login to ghcr.io
              uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}
            - name: Alias kyanite-gaming → kyanite
              run: |
                  docker buildx imagetools create \
                      -t ghcr.io/${{ github.repository_owner }}/kyanite-gaming:stable \
                      ghcr.io/${{ github.repository_owner }}/kyanite:stable
            - name: Alias kyanite-dx-gaming → kyanite-dx
              run: |
                  docker buildx imagetools create \
                      -t ghcr.io/${{ github.repository_owner }}/kyanite-dx-gaming:stable \
                      ghcr.io/${{ github.repository_owner }}/kyanite-dx:stable
